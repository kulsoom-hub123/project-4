<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Signup</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(270deg, #6a11cb, #2575fc, #ff6a00);
  background-size: 600% 600%;
  animation: gradientMove 10s ease infinite;
  overflow: hidden;
}

/* Animated background */
@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* Floating circles */
.circle {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  animation: float 10s infinite ease-in-out;
}

.circle:nth-child(1) { width: 150px; height:150px; top:10%; left:10%; }
.circle:nth-child(2) { width: 200px; height:200px; bottom:15%; right:15%; animation-duration: 14s;}
.circle:nth-child(3) { width: 100px; height:100px; bottom:20%; left:20%; animation-duration: 12s;}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-30px); }
}

/* Glass card */
.container {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 20px;
  width: 320px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  text-align: center;
  color: #fff;
}

h2 {
  margin-bottom: 20px;
}

.input-box {
  margin: 15px 0;
  position: relative;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
}

input:focus {
  box-shadow: 0 0 10px #fff;
}

/* Password strength */
.strength {
  height: 5px;
  border-radius: 5px;
  margin-top: 5px;
  transition: 0.3s;
}

/* Button */
button {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #fff;
  color: #333;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* Success message */
.success {
  display: none;
  margin-top: 15px;
  color: #00ffcc;
}
</style>

</head>

<body>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<div class="container">
  <h2>Create Account</h2>

  <div class="input-box">
    <input type="text" placeholder="Full Name" required>
  </div>

  <div class="input-box">
    <input type="email" placeholder="Email" required>
  </div>

  <div class="input-box">
    <input type="password" id="password" placeholder="Password" required>
    <div class="strength" id="strengthBar"></div>
  </div>

<button onclick="signup()">Sign Up</button>

  <div class="success" id="successMsg">🎉 Account Created Successfully!</div>
</div>

<script>
const password = document.getElementById("password");
const strengthBar = document.getElementById("strengthBar");

password.addEventListener("input", () => {
  const val = password.value;
  let strength = 0;

  if (val.length > 5) strength++;
  if (val.match(/[A-Z]/)) strength++;
  if (val.match(/[0-9]/)) strength++;
  if (val.match(/[^A-Za-z0-9]/)) strength++;

  if (strength === 1) {
    strengthBar.style.width = "25%";
    strengthBar.style.background = "red";
  } else if (strength === 2) {
    strengthBar.style.width = "50%";
    strengthBar.style.background = "orange";
  } else if (strength === 3) {
    strengthBar.style.width = "75%";
    strengthBar.style.background = "yellow";
  } else if (strength === 4) {
    strengthBar.style.width = "100%";
    strengthBar.style.background = "green";
  } else {
    strengthBar.style.width = "0%";
  }
});

function signup() {
  document.getElementById("successMsg").style.display = "block";
}
</script>

</body>
</html>
