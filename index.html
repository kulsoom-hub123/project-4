<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup App</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(-45deg, #0f172a, #1e3a8a, #9333ea, #0ea5e9);
  background-size: 400% 400%;
  animation: bg 10s ease infinite;
}

@keyframes bg {
  0% {background-position: 0%;}
  50% {background-position: 100%;}
  100% {background-position: 0%;}
}

/* FORM */
.container {
  width: 380px;
  padding: 30px;
  border-radius: 15px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  color: white;
  box-shadow: 0 0 30px rgba(0,0,0,0.3);
}

h2 {
  text-align: center;
  margin-bottom: 15px;
}

.field {
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.15);
  color: white;
}

input:focus {
  border: 2px solid #22c55e;
}

.error {
  font-size: 12px;
  color: #ff6b6b;
  margin-top: 3px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

/* SUCCESS SCREEN */
#successScreen {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: linear-gradient(135deg, #0f172a, #22c55e);
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
}

.check {
  width: 100px;
  height: 100px;
  background: white;
  color: #22c55e;
  font-size: 60px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  animation: pop 0.5s ease;
}

@keyframes pop {
  from {transform: scale(0);}
  to {transform: scale(1);}
}

#successScreen h1 {
  margin-top: 10px;
}

#successScreen button {
  margin-top: 20px;
  background: white;
  color: #22c55e;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- FORM -->
<div class="container" id="formBox">
  <h2>Create Account</h2>

  <div class="field">
    <input id="name" placeholder="Full Name">
    <div class="error" id="nameErr"></div>
  </div>

  <div class="field">
    <input id="email" placeholder="Email">
    <div class="error" id="emailErr"></div>
  </div>

  <div class="field">
    <input id="phone" placeholder="Phone Number">
    <div class="error" id="phoneErr"></div>
  </div>

  <div class="field">
    <input id="age" placeholder="Age">
    <div class="error" id="ageErr"></div>
  </div>

  <div class="field">
    <input type="password" id="password" placeholder="Password">
    <div class="error" id="passErr"></div>
  </div>

  <div class="field">
    <input type="password" id="confirm" placeholder="Confirm Password">
    <div class="error" id="confirmErr"></div>
  </div>

  <button onclick="submitForm()">Create Account</button>
</div>

<!-- SUCCESS SCREEN -->
<div id="successScreen">
  <div class="check">✔</div>
  <h1>Account Created!</h1>
  <p>Welcome 🎉</p>
  <button onclick="goBack()">Back</button>
</div>

<script>

function submitForm() {

  let name = document.getElementById("name").value.trim();
  let email = document.getElementById("email").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let age = document.getElementById("age").value.trim();
  let password = document.getElementById("password").value;
  let confirm = document.getElementById("confirm").value;

  let valid = true;

  // reset errors
  document.querySelectorAll(".error").forEach(e => e.innerText = "");

  // NAME
  if (name.length < 3) {
    document.getElementById("nameErr").innerText = "Enter valid name";
    valid = false;
  }

  // EMAIL
  let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
  if (!emailPattern.test(email)) {
    document.getElementById("emailErr").innerText = "Invalid email";
    valid = false;
  }

  // PHONE
  if (phone.length < 10) {
    document.getElementById("phoneErr").innerText = "Invalid phone number";
    valid = false;
  }

  // AGE
  if (age < 10 || age > 100) {
    document.getElementById("ageErr").innerText = "Invalid age";
    valid = false;
  }

  // PASSWORD
  if (password.length < 6) {
    document.getElementById("passErr").innerText = "Min 6 characters";
    valid = false;
  }

  // CONFIRM PASSWORD
  if (password !== confirm) {
    document.getElementById("confirmErr").innerText = "Passwords do not match";
    valid = false;
  }

  // SUCCESS
  if (valid) {
    document.getElementById("formBox").style.display = "none";
    document.getElementById("successScreen").style.display = "flex";
  }
}

function goBack() {
  document.getElementById("successScreen").style.display = "none";
  document.getElementById("formBox").style.display = "block";
}

</script>

</body>
</html>
