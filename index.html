<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Pro Form</title>

<style>
* { box-sizing: border-box; font-family: Arial; }

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg,#0f172a,#1e3a8a);
}

.container {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    padding: 30px;
    border-radius: 16px;
    width: 360px;
    color: white;
}

h2 { text-align: center; }

.field {
    position: relative;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 14px 10px;
    border-radius: 8px;
    border: 2px solid transparent;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

label {
    position: absolute;
    left: 10px;
    top: 12px;
    font-size: 14px;
    color: #ccc;
    transition: 0.3s;
}

input:focus + label,
input:not(:placeholder-shown) + label {
    top: -8px;
    font-size: 11px;
    color: #22c55e;
}

.error-text {
    font-size: 12px;
    color: #ff6b6b;
}

.success-border { border-color: #22c55e; }
.error-border { border-color: #ff4d4d; }

.strength-bar {
    height: 5px;
    border-radius: 5px;
    margin-top: 5px;
    background: gray;
    transition: 0.3s;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #22c55e;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:disabled {
    background: gray;
    cursor: not-allowed;
}

.toggle {
    position: absolute;
    right: 10px;
    top: 14px;
    cursor: pointer;
    font-size: 12px;
}

#success {
    text-align: center;
    margin-top: 15px;
    color: lightgreen;
    display: none;
}
</style>
</head>

<body>

<div class="container">
    <h2>Create Account</h2>

    <div class="field">
        <input id="name" placeholder=" " />
        <label>Name</label>
        <div class="error-text"></div>
    </div>

    <div class="field">
        <input id="email" placeholder=" " />
        <label>Email</label>
        <div class="error-text"></div>
    </div>

    <div class="field">
        <input type="password" id="password" placeholder=" " />
        <label>Password</label>
        <span class="toggle" onclick="togglePass()">Show</span>
        <div class="strength-bar" id="bar"></div>
        <div class="error-text"></div>
    </div>

    <div class="field">
        <input type="password" id="confirm" placeholder=" " />
        <label>Confirm Password</label>
        <div class="error-text"></div>
    </div>

    <button id="submitBtn" disabled>Create Account</button>

    <div id="success">🎉 Account Created Successfully</div>
</div>

<script>

const form = {
    name: document.getElementById("name"),
    email: document.getElementById("email"),
    password: document.getElementById("password"),
    confirm: document.getElementById("confirm"),
    button: document.getElementById("submitBtn")
};

const validators = {

    name: () => form.name.value.trim().length > 2,

    email: () => /^[^ ]+@[^ ]+\.[a-z]{2,3}$/.test(form.email.value),

    password: () => form.password.value.length >= 6,

    confirm: () => form.password.value === form.confirm.value
};

function validate(input, condition, message) {
    const error = input.parentElement.querySelector(".error-text");

    if (!condition()) {
        input.classList.add("error-border");
        input.classList.remove("success-border");
        error.innerText = message;
        return false;
    } else {
        input.classList.remove("error-border");
        input.classList.add("success-border");
        error.innerText = "";
        return true;
    }
}

// Real-time validation
form.name.oninput = () => validate(form.name, validators.name, "Min 3 chars");
form.email.oninput = () => validate(form.email, validators.email, "Invalid email");
form.password.oninput = () => {
    validate(form.password, validators.password, "Min 6 chars");
    updateStrength();
};
form.confirm.oninput = () => validate(form.confirm, validators.confirm, "Passwords mismatch");

// Password strength bar
function updateStrength() {
    const bar = document.getElementById("bar");
    let val = form.password.value;

    if (val.length < 6) {
        bar.style.width = "30%";
        bar.style.background = "red";
    } else if (/[A-Z]/.test(val) && /[0-9]/.test(val)) {
        bar.style.width = "100%";
        bar.style.background = "limegreen";
    } else {
        bar.style.width = "60%";
        bar.style.background = "orange";
    }
}

// Enable button only if valid
setInterval(() => {
    const allValid =
        validators.name() &&
        validators.email() &&
        validators.password() &&
        validators.confirm();

    form.button.disabled = !allValid;
}, 300);

// Toggle password
function togglePass() {
    form.password.type =
        form.password.type === "password" ? "text" : "password";
}

// Submit
form.button.onclick = () => {
    document.getElementById("success").style.display = "block";
};

</script>

</body>
</html>
