<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title><b>>Pro Signup Form</b></title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg,#0f172a,#1e40af);
}

.container {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(25px);
    padding: 35px;
    border-radius: 20px;
    width: 380px;
    color: white;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

h2 {
    text-align: center;
    margin-bottom: 25px;
    font-weight: 500;
}

.field {
    position: relative;
    margin-bottom: 22px;
}

input {
    width: 100%;
    padding: 14px 12px;
    border-radius: 10px;
    border: 2px solid transparent;
    outline: none;
    background: rgba(255,255,255,0.08);
    color: white;
    transition: 0.3s;
}

input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 10px rgba(59,130,246,0.6);
}

label {
    position: absolute;
    left: 12px;
    top: 13px;
    font-size: 13px;
    color: #bbb;
    transition: 0.3s;
}

input:focus + label,
input:not(:placeholder-shown) + label {
    top: -9px;
    font-size: 11px;
    color: #22c55e;
}

.error-text {
    font-size: 12px;
    color: #ff6b6b;
    margin-top: 4px;
}

.success-border {
    border-color: #22c55e !important;
    box-shadow: 0 0 8px rgba(34,197,94,0.5);
}

.error-border {
    border-color: #ff4d4d !important;
    box-shadow: 0 0 8px rgba(255,77,77,0.5);
}

.strength-bar {
    height: 6px;
    border-radius: 6px;
    margin-top: 6px;
    background: gray;
    transition: all 0.4s ease;
}

button {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg,#22c55e,#16a34a);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(34,197,94,0.4);
}

button:disabled {
    background: gray;
    cursor: not-allowed;
    box-shadow: none;
}

.toggle {
    position: absolute;
    right: 12px;
    top: 14px;
    cursor: pointer;
    font-size: 12px;
    color: #aaa;
}

#success {
    text-align: center;
    margin-top: 18px;
    color: lightgreen;
    display: none;
    font-size: 14px;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>

</head>

<body>

<div class="container">
    <h2>Create Account</h2>

```
<div class="field">
    <input id="name" placeholder=" " />
    <label>Name</label>
    <div class="error-text"></div>
</div>

<div class="field">
    <input id="email" placeholder=" " />
    <label>Email</label>
    <div class="error-text"></div>
</div>

<div class="field">
    <input type="password" id="password" placeholder=" " />
    <label>Password</label>
    <span class="toggle" onclick="togglePass()">Show</span>
    <div class="strength-bar" id="bar"></div>
    <div class="error-text"></div>
</div>

<div class="field">
    <input type="password" id="confirm" placeholder=" " />
    <label>Confirm Password</label>
    <div class="error-text"></div>
</div>

<button id="submitBtn" disabled>Create Account</button>

<div id="success">🎉 Account Created Successfully</div>
```

</div>

<script>
const form = {
    name: document.getElementById("name"),
    email: document.getElementById("email"),
    password: document.getElementById("password"),
    confirm: document.getElementById("confirm"),
    button: document.getElementById("submitBtn")
};

const validators = {
    name: () => form.name.value.trim().length > 2,
    email: () => /^[^ ]+@[^ ]+\.[a-z]{2,3}$/.test(form.email.value),
    password: () => form.password.value.length >= 6,
    confirm: () => form.password.value === form.confirm.value
};

function validate(input, condition, message) {
    const error = input.parentElement.querySelector(".error-text");

    if (!condition()) {
        input.classList.add("error-border");
        input.classList.remove("success-border");
        error.innerText = message;
        return false;
    } else {
        input.classList.remove("error-border");
        input.classList.add("success-border");
        error.innerText = "";
        return true;
    }
}

// Events (professional way)
document.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", checkForm);
});

// Real-time validation
form.name.oninput = () => validate(form.name, validators.name, "Min 3 chars");
form.email.oninput = () => validate(form.email, validators.email, "Invalid email");
form.password.oninput = () => {
    validate(form.password, validators.password, "Min 6 chars");
    updateStrength();
};
form.confirm.oninput = () => validate(form.confirm, validators.confirm, "Passwords mismatch");

// Enable button
function checkForm() {
    const allValid =
        validators.name() &&
        validators.email() &&
        validators.password() &&
        validators.confirm();

    form.button.disabled = !allValid;
}

// Strength meter
function updateStrength() {
    const bar = document.getElementById("bar");
    let val = form.password.value;

    if (val.length < 6) {
        bar.style.width = "30%";
        bar.style.background = "red";
    } else if (/[A-Z]/.test(val) && /[0-9]/.test(val) && /[^A-Za-z0-9]/.test(val)) {
        bar.style.width = "100%";
        bar.style.background = "limegreen";
    } else {
        bar.style.width = "60%";
        bar.style.background = "orange";
    }
}

// Toggle password
function togglePass() {
    form.password.type =
        form.password.type === "password" ? "text" : "password";
}

// Submit
form.button.onclick = () => {
    form.button.innerText = "Creating...";
    setTimeout(() => {
        document.getElementById("success").style.display = "block";
        form.button.innerText = "Done ✓";
    }, 1000);
};
</script>

</body>
</html>
