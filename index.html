<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DecodeLabs - Signup</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;

  background: linear-gradient(-45deg,#0f172a,#1e3a8a,#9333ea,#0ea5e9);
  background-size:400% 400%;
  animation:bg 10s ease infinite;
}

@keyframes bg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* CARD */
.card{
  width:100%;
  max-width:420px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(18px);
  border-radius:18px;
  padding:25px;
  color:white;
  box-shadow:0 0 40px rgba(0,0,0,0.3);
}

/* TITLE */
h2{
  text-align:center;
  margin-bottom:5px;
}

.sub{
  text-align:center;
  font-size:12px;
  color:#ddd;
  margin-bottom:20px;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin-bottom:5px;
  border-radius:10px;
  border:none;
  outline:none;
  background: rgba(255,255,255,0.15);
  color:white;
}

input:focus{
  border:2px solid #22c55e;
}

.error{
  font-size:12px;
  color:#ff6b6b;
  margin-bottom:10px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
}

/* SUCCESS */
#success{
  display:none;
  position:fixed;
  inset:0;
  background: linear-gradient(135deg,#0f172a,#22c55e);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
}

.tick{
  width:100px;
  height:100px;
  border-radius:50%;
  background:white;
  color:#22c55e;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:55px;
  animation:pop 0.4s ease;
}

@keyframes pop{
  from{transform:scale(0)}
  to{transform:scale(1)}
}

#success h1{
  margin-top:10px;
}

#success button{
  margin-top:15px;
  background:white;
  color:#22c55e;
  padding:10px 20px;
}
</style>
</head>

<body>

<!-- FORM -->
<div class="card" id="form">
  <h2>Sign Up</h2>
  <div class="sub">DecodeLabs Registration</div>

  <input id="name" placeholder="Full Name">
  <div class="error" id="e1"></div>

  <input id="email" placeholder="Email">
  <div class="error" id="e2"></div>

  <input id="phone" placeholder="Phone">
  <div class="error" id="e3"></div>

  <input type="password" id="pass" placeholder="Password">
  <div class="error" id="e4"></div>

  <input type="password" id="cpass" placeholder="Confirm Password">
  <div class="error" id="e5"></div>

  <button onclick="submit()">Create Account</button>
</div>

<!-- SUCCESS -->
<div id="success">
  <div class="tick">✔</div>
  <h1>Account Created!</h1>
  <p>Welcome to DecodeLabs 🚀</p>
  <button onclick="back()">Back</button>
</div>

<script>

function submit(){

let name=document.getElementById("name").value.trim();
let email=document.getElementById("email").value.trim();
let phone=document.getElementById("phone").value.trim();
let pass=document.getElementById("pass").value;
let cpass=document.getElementById("cpass").value;

let ok=true;

document.querySelectorAll(".error").forEach(e=>e.innerText="");

if(name.length<3){
document.getElementById("e1").innerText="Enter valid name";
ok=false;
}

if(!email.includes("@")){
document.getElementById("e2").innerText="Invalid email";
ok=false;
}

if(phone.length<10){
document.getElementById("e3").innerText="Invalid phone";
ok=false;
}

if(pass.length<6){
document.getElementById("e4").innerText="Min 6 characters";
ok=false;
}

if(pass!==cpass){
document.getElementById("e5").innerText="Password not match";
ok=false;
}

if(ok){
document.getElementById("form").style.display="none";
document.getElementById("success").style.display="flex";
}

}

function back(){
document.getElementById("success").style.display="none";
document.getElementById("form").style.display="block";
}

</script>

</body>
</html>
